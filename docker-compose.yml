services:
  postgres:
    image: postgres:16-alpine
    container_name: contractflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: contractflow
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: contractflow
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contractflow -d contractflow"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: contractflow-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9100:9000"
      - "9101:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: contractflow-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        (mc mb --ignore-existing local/contracts) &&
        mc anonymous set none local/contracts &&
        echo "MinIO bucket 'contracts' ready"

volumes:
  postgres_data:
  minio_data:
